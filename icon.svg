<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f6e08a"/>
      <stop offset="0.5" stop-color="#e8c84e"/>
      <stop offset="1" stop-color="#c9a227"/>
    </linearGradient>
  </defs>

  <!-- black background -->
  <rect width="512" height="512" rx="112" fill="#0b0a08"/>
  <rect x="16" y="16" width="480" height="480" rx="96" fill="none" stroke="url(#gold)" stroke-width="2.5" opacity="0.35"/>

  <!-- a few math symbols coming off the hat -->
  <g fill="url(#gold)" font-family="Georgia, 'Times New Roman', serif" opacity="0.92">
    <text x="74"  y="150" font-size="50">π</text>
    <text x="392" y="150" font-size="50">∑</text>
    <text x="120" y="408" font-size="46">√</text>
    <text x="372" y="410" font-size="46">×</text>
  </g>

  <!-- mortarboard -->
  <g stroke-linejoin="round">
    <!-- cap band (under the board) -->
    <path d="M206 244 H306 L296 286 Q256 304 216 286 Z" fill="#c9a227"/>
    <!-- flat board -->
    <polygon points="256,168 400,224 256,280 112,224" fill="url(#gold)" stroke="#0b0a08" stroke-width="4"/>
    <!-- centre button -->
    <circle cx="256" cy="224" r="9" fill="#c9a227" stroke="#0b0a08" stroke-width="2"/>
    <!-- tassel -->
    <path d="M256 224 L386 198" fill="none" stroke="#f6e08a" stroke-width="5" stroke-linecap="round"/>
    <path d="M386 198 L386 280" fill="none" stroke="#f6e08a" stroke-width="5" stroke-linecap="round"/>
    <circle cx="386" cy="290" r="12" fill="#f6e08a"/>
  </g>
</svg>
