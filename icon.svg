<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8e69a"/>
      <stop offset="0.5" stop-color="#e8c84e"/>
      <stop offset="1" stop-color="#c69a1f"/>
    </linearGradient>
    <linearGradient id="goldDeep" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#c9a227"/>
      <stop offset="1" stop-color="#9c7a18"/>
    </linearGradient>
  </defs>

  <!-- black background -->
  <rect width="512" height="512" rx="112" fill="#0b0a08"/>
  <rect x="16" y="16" width="480" height="480" rx="96" fill="none" stroke="url(#gold)" stroke-width="2.5" opacity="0.3"/>

  <!-- a few math symbols coming off the hat -->
  <g fill="url(#gold)" font-family="Georgia, 'Times New Roman', serif" opacity="0.82">
    <text x="80"  y="150" font-size="46">π</text>
    <text x="398" y="150" font-size="46">∑</text>
    <text x="124" y="404" font-size="42">√</text>
    <text x="374" y="406" font-size="42">×</text>
  </g>

  <!-- cap base (the part that sits on the head) -->
  <path d="M210 250 L302 250 L292 292 Q256 310 220 292 Z" fill="url(#goldDeep)"/>

  <!-- board underside (gives 3D thickness) -->
  <path d="M104 216 L256 280 L408 216 L408 230 L256 294 L104 230 Z" fill="url(#goldDeep)"/>

  <!-- board top face -->
  <polygon points="256,150 408,216 256,282 104,216" fill="url(#gold)" stroke="#0b0a08" stroke-width="3"/>
  <!-- soft highlight -->
  <polygon points="256,170 356,216 256,262 156,216" fill="#ffffff" opacity="0.07"/>

  <!-- centre button -->
  <circle cx="256" cy="216" r="8.5" fill="url(#goldDeep)" stroke="#0b0a08" stroke-width="1.5"/>

  <!-- tassel: cord over to the right edge, then hanging down with a tuft -->
  <path d="M256 216 Q336 202 394 208" fill="none" stroke="#f3d97a" stroke-width="5" stroke-linecap="round"/>
  <line x1="394" y1="208" x2="394" y2="286" stroke="#f3d97a" stroke-width="5" stroke-linecap="round"/>
  <circle cx="394" cy="288" r="7" fill="#f3d97a"/>
  <path d="M386 292 L382 322 M394 294 L394 326 M402 292 L406 322" stroke="#e8c84e" stroke-width="4" stroke-linecap="round" fill="none"/>
</svg>
